document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s: 4px; width: 24px; height: 24px; cursor: pointer; font-size: 13px; line-height: 1; flex: none;\n  }\n  #panel-body { overflow-y: auto; padding: 12px 16px 16px; }\n  #panel.collapsed #panel-body { display: none; }\n\n  .sec { margin-bottom: 14px; }\n  .sec h2 {\n    font-family: 'Veneer', Impact, sans-serif; font-weight: normal; font-size: 15px;\n    color: var(--purple); letter-spacing: 1px; margin-bottom: 7px;\n  }\n  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; }\n  .btn-row button {\n    font-family: Verdana, sans-serif; font-size: 11px; font-weight: bold;\n    padding: 7px 10px; border-radius: 4px; border: 1.5px solid var(--purple);\n    background: #ffffff; color: var(--purple); cursor: pointer;\n  }\n  .btn-row button:hover { background: #f3effa; }\n  .btn-row button.active { background: var(--purple); color: #ffffff; }\n\n  .toggles { display: flex; flex-direction: column; gap: 7px; }\n  .toggles label { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--ink); cursor: pointer; }\n  .toggles input { accent-color: var(--pink); width: 15px; height: 15px; }\n\n  .readout { display: flex; align-items: baseline; gap: 7px; background: #f3effa; border-radius: 6px; padding: 8px 11px; }\n  .readout-val { font-family: 'Veneer', Impact, sans-serif; font-size: 26px; color: var(--purple); line-height: 1; }\n  .readout-lbl { font-size: 10.5px; color: #555555; }\n  .micro { font-size: 10px; color: #777777; line-height: 1.5; margin-top: 8px; }\n  .micro b { color: var(--purple); }\n\n  ol.legend { list-style: none; display: flex; flex-direction: column; gap: 8px; }\n  ol.legend li { display: flex; gap: 9px; font-size: 11px; line-height: 1.45; color: #333333; }\n  ol.legend li.dim { opacity: 0.38; }\n  ol.legend .num {\n    flex: none; width: 20px; height: 20px; border-radius: 50%;\n    background: var(--lime); color: var(--purple);\n    font-family: 'Veneer', Impact, sans-serif; font-size: 13px;\n    display: flex; align-items: center; justify-content: center; margin-top: 1px;\n  }\n  ol.legend b { color: var(--purple); }\n\n  .hint {\n    font-size: 10px; color: #777777; border-top: 1px solid #eeeeee;\n    padding-top: 9px; line-height: 1.5;\n  }\n  @media (max-width: 640px) {\n    #panel { width: calc(100% - 32px); max-height: 55%; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div id=\"viewport\"><\u002Fdiv>\n<div id=\"loading\">BUILDING YOUR STAND…<\u002Fdiv>\n\n<div id=\"panel\">\n  <div id=\"panel-head\">\n    <div class=\"stairs\"><span style=\"height: 25%;\"><\u002Fspan><span style=\"height: 50%;\"><\u002Fspan><span style=\"height: 75%;\"><\u002Fspan><span style=\"height: 100%;\"><\u002Fspan><\u002Fdiv>\n    <div>\n      <h1>NEW FOREST SHOW ’26<\u002Fh1>\n      <p>Step by Step — 3×3 m stand concept<\u002Fp>\n    <\u002Fdiv>\n    <button id=\"panel-collapse\" title=\"Collapse panel\">–<\u002Fbutton>\n  <\u002Fdiv>\n  <div id=\"panel-body\">\n    <div class=\"sec\">\n      <h2>VIEWS<\u002Fh2>\n      <div class=\"btn-row\">\n        <button data-preset=\"visitor\">Visitor<\u002Fbutton>\n        <button data-preset=\"inside\">On stand<\u002Fbutton>\n        <button data-preset=\"staff\">Staff area<\u002Fbutton>\n        <button data-preset=\"plan\">Plan<\u002Fbutton>\n        <button data-preset=\"orbit\">Orbit<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sec\">\n      <h2>OPTIONS<\u002Fh2>\n      <div class=\"toggles\">\n        <label><input type=\"checkbox\" id=\"toggle-falseback\" checked=\"\"> False back at 2 m + hidden staff area<\u002Flabel>\n        <label><input type=\"checkbox\" id=\"toggle-labels\" checked=\"\"> Numbered labels<\u002Flabel>\n        <label><input type=\"checkbox\" id=\"toggle-roof\" checked=\"\"> Marquee roof &amp; fascia (auto-lifts when you look down)<\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sec\">\n      <h2>FRONT CURTAINS<\u002Fh2>\n      <div class=\"btn-row\" style=\"margin-bottom: 8px;\">\n        <button data-curtain=\"off\">Tie-backs only<\u002Fbutton>\n        <button data-curtain=\"white\">White drape<\u002Fbutton>\n        <button data-curtain=\"purple\">Purple drape<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"readout\">\n        <span class=\"readout-val\" id=\"opening-readout\">2.10 m<\u002Fspan>\n        <span class=\"readout-lbl\">clear opening · <span id=\"opening-note\">with purple cover drape<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"micro\">The cream tie-back curtains can’t be removed. A brand drape hung in front hides them — it takes ~450 mm off each side (vs ~300 mm for the tie-backs alone), so the <b>3.0 m<\u002Fb> front narrows to about <b>2.1 m<\u002Fb>.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"sec\">\n      <h2>WHAT’S ON THE STAND<\u002Fh2>\n      <ol class=\"legend\">\n        <li id=\"legend-1\"><span class=\"num\">1<\u002Fspan><span><b>Hoisted main banner<\u002Fb> — new print on a free-standing timber frame that holds it high, <i>above<\u002Fi> the bunting. Nothing fixed to the tent, and the stand front stays open — no barrier.<\u002Fspan><\u002Fli>\n        <li id=\"legend-2\"><span class=\"num\">2<\u002Fspan><span><b>Tension-fabric media wall<\u002Fb> (2.4 m wide) with built-in <b>LED spotlights<\u002Fb>. Sits to the left, leaving a <b>600 mm access gap<\u002Fb> on the right to slip behind. Doubles as the divider.<\u002Fspan><\u002Fli>\n        <li id=\"legend-3\"><span class=\"num\">3<\u002Fspan><span><b>Screen on a dressed table<\u002Fb> — the Mobile Pixels sits on a 700×700 mm table with a <b>floor-length brand tablecloth<\u002Fb>; the printed cut-out surround wraps the screen with “Take a Stand Against Youth Homelessness” above. Lifts off each night.<\u002Fspan><\u002Fli>\n        <li id=\"legend-4\"><span class=\"num\">4<\u002Fspan><span><b>Two pull-up banners<\u002Fb> (850 mm each) — “Behind Every Hero” + “Be the Hero of Your Own Story”, against a white shimmery fabric that softens the left wall.<\u002Fspan><\u002Fli>\n        <li id=\"legend-5\"><span class=\"num\">5<\u002Fspan><span><b>Pop-up desk + donation bucket<\u002Fb> — at the entry gap, angled to greet not block.<\u002Fspan><\u002Fli>\n        <li id=\"legend-6\"><span class=\"num\">6<\u002Fspan><span><b>Single-column leaflet stand<\u002Fb> — out at the front of the gazebo, just before the A-frame, to grab passers-by.<\u002Fspan><\u002Fli>\n        <li id=\"legend-7\"><span class=\"num\">7<\u002Fspan><span><b>“Step Up” game<\u002Fb> — pulled out <i>in front<\u002Fi> of the tent to draw people in. Placeholder — swap for whatever game you land on.<\u002Fspan><\u002Fli>\n        <li id=\"legend-8\"><span class=\"num\">8<\u002Fspan><span><b>False back + staff area<\u002Fb> — the media wall sits on the 2 m line; garden box behind it is your seat/desk and storage.<\u002Fspan><\u002Fli>\n        <li id=\"legend-9\"><span class=\"num\">9<\u002Fspan><span><b>A-frame board<\u002Fb> — out on the walkway to catch attention and point people in.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div class=\"hint\">Drag to orbit • scroll to zoom • right-drag to pan. Use the toggles to compare layouts — tell me what to move and I’ll update the model.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  window.__errs = [];\n  window.addEventListener('error', function (e) {\n    window.__errs.push((e.message || '') + ' @ ' + (e.filename || '').split('/').pop() + ':' + e.lineno);\n  });\n  window.addEventListener('unhandledrejection', function (e) {\n    window.__errs.push('rejection: ' + (e.reason && e.reason.stack ? e.reason.stack.slice(0, 300) : String(e.reason)));\n  });\n<\u002Fscript>\n<script src=\"fa98dc20-fb44-4199-9889-0d3d7fec4c43\"><\u002Fscript>\n<script src=\"1d4e625c-bfa7-41ae-9918-5559d1eaac51\"><\u002Fscript>\n<script src=\"f3ae6004-46b5-49db-8df7-4edc8bc9a36d\"><\u002Fscript>\n<script src=\"b2500b56-7b2f-4f89-b68f-8228fca96c88\"><\u002Fscript>\n<script src=\"516bcb2c-ff2d-46e5-8193-2e82b767a85c\"><\u
